name: Build + publish release

# Runs when a version tag is pushed (e.g. `git push --follow-tags` after
# `npm version minor`) or when manually dispatched from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why this manual build? (logged in run name)'
        required: false
        default: 'manual dispatch'

# electron-builder uploads to the same repo's Releases via the auto-provided
# GITHUB_TOKEN. The token needs `contents: write` to create draft releases
# and upload assets.
permissions:
  contents: write

jobs:
  # Two SKUs per release:
  #   - slim : ~200 MB, ESP32 lazy-downloaded at first compile.
  #   - full : ~1 GB,   ESP32 bundled. For offline classrooms / USB-stick
  #             distribution.
  # Both ship to the same draft GitHub Release, on different update channels
  # (latest.yml for slim, latest-full.yml for full) so auto-update stays
  # consistent within each variant.
  #
  # Slim runs first; Full waits for Slim to succeed so we never get two
  # electron-builder processes racing to create the same draft.
  build-windows:
    name: Windows installer (${{ matrix.sku.name }})
    runs-on: windows-latest
    timeout-minutes: 120

    strategy:
      fail-fast: false  # if Full fails, the Slim draft still ships
      max-parallel: 1   # serialize to avoid two builds racing for the same draft release
      matrix:
        sku:
          - name: slim
            label: Slim (lazy ESP32)
            # Slim uses default productName / appId / channel — exact same
            # build as before this matrix was introduced.
            extra_build_args: ''
          - name: full
            label: Full (bundled ESP32)
            # Distinct productName + appId so Full can sit side-by-side with
            # Slim on the same machine without overwriting it. Distinct
            # publish.channel so latest-full.yml describes the Full asset
            # without clobbering slim's latest.yml.
            # Single-quote every arg that contains EITHER a space OR a
            # `$`. Spaces get tokenised by PowerShell otherwise; `${name}`
            # is ALSO valid PowerShell variable syntax (delimited form),
            # so unquoted `${version}` and `${ext}` were silently expanded
            # to empty strings on the way to electron-builder. That made
            # artifactName collapse to `Lotus-IDE-Full-Setup-.` in v1.3.3
            # and electron-builder ENOENT'd trying to read it back.
            # Inside single-quoted PS literals, neither happens — the
            # template tokens pass through unchanged to electron-builder
            # which substitutes them via its own ${...} engine.
            # Override win.target to drop "zip" for Full only. With
            # compression: "store" the Full zip is ~2.1 GB which trips
            # GitHub's 2 GiB asset cap and 422s the entire publish step
            # (root-caused after every tag from v1.3.7..v1.7.2 left CI
            # red + drafts unpublished). The NSIS installer is already
            # extractable and carries the blockmap, so dropping the zip
            # costs us nothing.
            extra_build_args: >-
              '--config.productName=Lotus IDE Full'
              --config.appId=com.lotus-arduibot.ide.full
              '--config.win.artifactName=Lotus-IDE-Full-Setup-${version}.${ext}'
              --config.win.target=nsis
              --config.publish.channel=latest-full

    env:
      # electron-builder reads GH_TOKEN to authenticate against the GitHub
      # provider. We publish to a SEPARATE public repo (LotusIDE-Releases)
      # so end users can download without seeing the source. The default
      # GITHUB_TOKEN is only scoped to this source repo, so we use a PAT
      # stored as RELEASES_TOKEN with `public_repo` scope on the releases
      # repo. Configure once at:
      #   github.com/jaturong-kamonlers/LotusIDE/settings/secrets/actions
      GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
      # Where setup-resources.ps1 fetches the bundled avr-gcc from. Pinned
      # to the tools-v1 release asset on this same repo. We use the API URL
      # (releases/assets/<id>) instead of browser_download_url so the same
      # token-auth flow works whether the repo is public or private.
      LOTUS_AVR_TOOLCHAIN_URL: https://api.github.com/repos/jaturong-kamonlers/LotusIDE/releases/assets/438239994
      LOTUS_AVR_TOOLCHAIN_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      # arduino-cli core install caches under
      # resources/arduino-cli/data/packages/. We let it run cold on each
      # build for now — caching can be added later if CI minutes become a
      # constraint. Each cache layer would key on the core version we
      # install, which isn't pinned yet.
      - name: Populate resources/ (arduino-cli + cores + avr-toolchain)
        shell: pwsh
        # Direct conditional invocation — NO splatting. PowerShell's
        # splat operator (@setupArgs with @('-WithEsp32')) silently
        # treats the dash-prefixed string as a POSITIONAL string arg
        # rather than a named switch. In v1.3.2 the Full job's
        # `@setupArgs` got bound to `[string]$AvrToolchainUrl` instead
        # of toggling `[switch]$WithEsp32`, so the script ran in slim
        # mode AND tried to download the literal string `-WithEsp32` as
        # the AVR toolchain URL. Conditional invocation skips the
        # splat-binding mess entirely.
        run: |
          Write-Host "Setup-resources mode: ${{ matrix.sku.name }}"
          if ('${{ matrix.sku.name }}' -eq 'full') {
            ./scripts/setup-resources.ps1 -WithEsp32
          } else {
            ./scripts/setup-resources.ps1
          }
          if (-not (Test-Path 'resources/avr-toolchain/tools/bin/avr-gcc.exe')) {
            throw 'avr-gcc.exe missing after setup — install failed'
          }

      - name: Build + publish to GitHub Releases (${{ matrix.sku.name }})
        shell: pwsh
        # `--publish always` tells electron-builder to upload even when the
        # tree is "dirty" relative to the tag. Output is a DRAFT release —
        # publishing it makes it visible to auto-update clients.
        # extra_build_args is per-SKU (productName / channel overrides for Full).
        run: |
          npm run build -- --publish always ${{ matrix.sku.extra_build_args }}

      - name: Summary
        if: success()
        shell: pwsh
        run: |
          Write-Host "✓ Built + published (${{ matrix.sku.label }})"
          Write-Host "  Draft release: https://github.com/${{ github.repository }}/releases"
          Write-Host "  After both SKUs finish, edit the draft and Publish."

  # Linux installers — AppImage + deb, both x64 (most desktops) and arm64
  # (Jetson Nano). Same slim/full SKU split as Windows. Runs AFTER
  # build-windows so we never get two electron-builder processes racing to
  # create/update the same draft release.
  #
  # Avr-toolchain comes from arduino-cli's `arduino:avr` install (see the
  # Linux path in scripts/setup-resources.sh) — no separate custom build is
  # needed off-Windows, and no LOTUS_AVR_TOOLCHAIN_URL secret is consumed.
  #
  # ARM64 runner cost (private repo): ~$0.005/min × ~40 min × 2 SKUs = ~$0.40
  # per release. Free runners are public-repo only as of early 2025.
  build-linux:
    name: Linux installer (${{ matrix.arch }} ${{ matrix.sku.name }})
    needs: build-windows
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-22.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      # Serialize x64 + arm64 + slim + full to avoid electron-builder racing
      # for the same `latest-linux.yml` channel file on the draft release.
      max-parallel: 1
      matrix:
        arch: [x64, arm64]
        sku:
          - name: slim
            label: Slim (lazy ESP32)
            setup_flag: '--no-esp32'
            extra_build_args: ''
          - name: full
            label: Full (bundled ESP32)
            setup_flag: '--with-esp32'
            # Distinct productName + appId + channel keep Full + Slim from
            # overwriting each other's auto-update channel YAML. Matches the
            # Windows job's Full SKU overrides.
            extra_build_args: >-
              --config.productName="Lotus IDE Full"
              --config.appId=com.lotus-arduibot.ide.full
              --config.linux.artifactName='Lotus-IDE-Full-${version}-${arch}.${ext}'
              --config.publish.channel=latest-full

    env:
      GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # electron-builder's deb postinst (build/linux/after-install.sh) needs
      # libarchive-tools at build time for the deb packaging step to find
      # `bsdtar`; rpm tooling is optional but cheap to include.
      - name: Install build dependencies (deb + AppImage tooling)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libarchive-tools fakeroot dpkg rpm \
            libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6

      - name: Install npm dependencies
        run: npm ci

      # setup-resources.sh on Linux auto-bootstraps resources/avr-toolchain/
      # from the arduino-cli `arduino:avr` install — no external token, no
      # custom-build zip. ~150 MB on disk to mirror the Windows layout.
      - name: Populate resources/ (arduino-cli + cores + avr-toolchain)
        run: |
          chmod +x scripts/setup-resources.sh build/linux/after-install.sh build/linux/after-remove.sh
          ./scripts/setup-resources.sh ${{ matrix.sku.setup_flag }}
          if [ ! -x resources/avr-toolchain/tools/bin/avr-gcc ]; then
            echo "::error::avr-gcc missing after setup — install failed"
            exit 1
          fi

      - name: Build + publish to GitHub Releases (${{ matrix.arch }} ${{ matrix.sku.name }})
        run: |
          npm run build -- --linux --${{ matrix.arch }} --publish always ${{ matrix.sku.extra_build_args }}

      - name: Summary
        if: success()
        run: |
          echo "✓ Built + published Linux ${{ matrix.arch }} (${{ matrix.sku.label }})"
          echo "  Draft release: https://github.com/${{ github.repository }}/releases"
