<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- motor outer ring -->
  <circle cx="16" cy="16" r="10" fill="#0D1117" stroke="#FFB74D" stroke-width="1.6"/>
  <!-- 4 spokes -->
  <line x1="16" y1="6" x2="16" y2="11" stroke="#FFB74D" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="21" x2="16" y2="26" stroke="#FFB74D" stroke-width="2" stroke-linecap="round"/>
  <line x1="6" y1="16" x2="11" y2="16" stroke="#FFB74D" stroke-width="2" stroke-linecap="round"/>
  <line x1="21" y1="16" x2="26" y2="16" stroke="#FFB74D" stroke-width="2" stroke-linecap="round"/>
  <!-- shaft hub -->
  <circle cx="16" cy="16" r="2.5" fill="#FFB74D"/>
  <!-- rotation arrow (curved) -->
  <path d="M 22 7 A 11 11 0 0 1 27 16" fill="none" stroke="#FFB74D" stroke-width="1.4" stroke-linecap="round"/>
