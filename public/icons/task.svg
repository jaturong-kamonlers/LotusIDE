<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Entry node (main thread) -->
  <circle cx="6" cy="16" r="2.8" fill="#7E57C2" stroke="#FFFFFF" stroke-width="1.2"/>

  <!-- Two parallel paths splitting toward Core 0 (top) and Core 1 (bottom) -->
  <path d="M 8.8 16 Q 14 16 16 9 L 21 9" stroke="#FFA726"
        stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M 8.8 16 Q 14 16 16 23 L 21 23" stroke="#42A5F5"
        stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Endpoint chips labelled with the core they run on -->
  <circle cx="24" cy="9" r="4" fill="#FFA726" stroke="#FFFFFF" stroke-width="1"/>
  <text x="24" y="11.2" text-anchor="middle" font-family="monospace"
        font-size="5.5" font-weight="700" fill="#FFFFFF">0</text>

  <circle cx="24" cy="23" r="4" fill="#42A5F5" stroke="#FFFFFF" stroke-width="1"/>
  <text x="24" y="25.2" text-anchor="middle" font-family="monospace"
        font-size="5.5" font-weight="700" fill="#FFFFFF">1</text>
</svg>
